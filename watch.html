<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Watch — CineVault</title>

<meta name="description" content="Watch movies and TV shows on CineVault." />
<meta name="theme-color" content="#0a0a0f" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css" />

<style>

.watch-page {
    padding: 24px;
}

.watch-layout {
    max-width: 1400px;
    margin:auto;
}

/* PLAYER */

.player-section {
    width:100%;
}

.player-frame {
    position:relative;
    width:100%;
    aspect-ratio:16 / 9;
    background:#050507;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
}

#playerWrap,
#playerWrap iframe {
    width:100%;
    height:100%;
}

#playerWrap iframe {
    border:0;
}


/* SOURCES */

.source-tabs {
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
}

.source-tab {
    background:#171720;
    color:#aaa;
    border:1px solid #272735;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.source-tab:hover,
.source-tab.active {
    background:#fff;
    color:#111;
}


/* DETAILS */

.watch-info {
    display:flex;
    gap:30px;
    margin-top:40px;
}

.watch-poster {
    width:220px;
    border-radius:16px;
    object-fit:cover;
    background:#15151d;
}


.watch-content {
    flex:1;
}


.watch-title {
    font-size:42px;
    margin:0 0 12px;
}


.watch-meta {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    color:#aaa;
}


.watch-meta span {
    background:#171720;
    padding:7px 12px;
    border-radius:10px;
}


.rating {
    color:#ffd34d;
}


.overview {
    margin-top:25px;
    color:#c4c4cc;
    line-height:1.7;
    max-width:900px;
}



/* EPISODES */

.episodes-section {
    margin-top:50px;
}


.episodes-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:15px;
    margin-top:20px;
}


.ep-card {
    background:#15151d;
    padding:16px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    display:flex;
    flex-direction:column;
    gap:8px;
}


.ep-card:hover,
.ep-card.active {
    background:#252535;
}


.ep-num {
    font-size:13px;
    color:#999;
}


.ep-title {
    font-weight:600;
}


.ep-runtime {
    color:#888;
    font-size:13px;
}



@media(max-width:700px){

.watch-page {
    padding:14px;
}

.watch-info {
    flex-direction:column;
}

.watch-poster {
    width:160px;
}

.watch-title {
    font-size:30px;
}

}

</style>

</head>


<body>


<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">

<a href="index.html" class="logo">

<span class="logo-mark">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7L8 5Z" fill="#0a0a0f"/>
</svg>
</span>

CineVault

</a>


<nav class="nav-group">

<a href="index.html" class="nav-link">Home</a>

<a href="search.html" class="nav-link">Search</a>

<a href="browse.html" class="nav-link">Browse</a>

</nav>


<div class="nav-group">

<div class="nav-label">
MEDIA
</div>


<a href="movies.html" class="nav-link">
Movies
</a>


<a href="tv.html" class="nav-link">
TV Shows
</a>


<a href="anime.html" class="nav-link">

</a>


<a href="watchlist.html" class="nav-link">
Watchlist
</a>


<a href="history.html" class="nav-link">
History
</a>


</div>


</aside>

<!-- MAIN CONTENT -->
<div class="content">

<div class="topbar">

<div class="search-box">

<svg class="search-icon"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8">

<circle cx="11" cy="11" r="7"/>
<path d="m21 21-4.3-4.3"/>

</svg>


<form id="topSearchForm">

<input
id="topSearchInput"
type="text"
placeholder="Search movies, TV shows, anime..."
autocomplete="off"
/>

</form>


<div id="searchResults" class="search-results"></div>

</div>


<div class="topbar-spacer"></div>


<div class="topbar-tag" id="apiStatusTag">
Checking TMDB...
</div>


</div>



<div class="watch-page">

<div class="watch-layout">


<!-- BACK BUTTON -->

<a href="javascript:history.back()" class="back-link">

<svg viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8">

<path d="M15 18l-6-6 6-6"/>

</svg>

Back

</a>



<!-- VIDEO PLAYER -->

<section class="player-section">


<div class="player-frame">


<div id="playerWrap">

<div class="empty-state">

<h3>
Loading player...
</h3>

</div>

</div>


</div>



<!-- STREAM SOURCES -->

<div 
id="sourceTabs"
class="source-tabs">
</div>


</section>





<!-- MOVIE INFO -->


<section class="watch-info">


<img 
id="watchPoster"
class="watch-poster"
src=""
alt="Poster"
/>



<div class="watch-content">


<h1 
id="watchTitle"
class="watch-title">

Loading...

</h1>

id="watchMeta"
class="watch-meta">

</div>

id="watchOverview"
class="overview">

</p>



</div>


</section>





<!-- EPISODES -->

<section 
class="episodes-section">


<h2>
Episodes
</h2>

id="episodeGrid"
class="episodes-grid">

</div>

</div>


</div>

</body>
</html>
