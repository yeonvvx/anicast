<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party — AniCast</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/yeonvvx/AniCastImages/main/Logo/anicast%20logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#e63946;--accent-dim:rgba(230,57,70,0.18);--accent-border:rgba(230,57,70,0.35);
  --bg:#08080e;--bg2:#101018;--bg3:#181825;--bg4:#20202e;
  --text:#f0f0f8;--muted:#7a7a96;--muted2:#545470;
  --radius:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── NAV (browse mode) ── */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;padding:0 2rem;gap:14px;background:rgba(8,8,14,0.98);border-bottom:0.5px solid rgba(255,255,255,0.07);backdrop-filter:blur(16px)}
.nav-logo-img{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.1)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--text)}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.nav-title em{color:var(--accent);font-style:normal}
.nav-right-area{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-user-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
.nav-user-chip img{width:24px;height:24px;border-radius:50%;object-fit:cover}

/* ── BROWSE PAGE ── */
.browse-page{max-width:1200px;margin:0 auto;padding:76px 2rem 4rem}
.browse-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.browse-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,44px);letter-spacing:2px}
.browse-title em{color:var(--accent);font-style:normal}
.header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tab-btns{display:flex;border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;overflow:hidden}
.tab-btn{padding:7px 16px;font-size:11px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.create-top-btn{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s}
.create-top-btn:hover{background:#c7303c}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--muted);font-family:inherit;transition:all 0.2s}
.filter-pill.active,.filter-pill:hover{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.rooms-count{font-size:12px;color:var(--muted);margin-left:auto}

/* ── ROOMS GRID ── */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.room-card{background:var(--bg2);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s;position:relative}
.room-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15)}
.room-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3)}
.room-card-body{padding:10px 12px 12px}
.room-card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.room-card-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.badge{font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.badge-sub{background:rgba(59,130,246,0.2);color:#60a5fa;border:0.5px solid rgba(59,130,246,0.3)}
.badge-dub{background:rgba(245,158,11,0.2);color:#fbbf24;border:0.5px solid rgba(245,158,11,0.3)}
.badge-ep{background:rgba(255,255,255,0.08);color:var(--muted);border:0.5px solid rgba(255,255,255,0.1)}
.room-card-status{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-live .status-dot{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.5);animation:sdpulse 1.5s infinite}
.status-waiting .status-dot{background:#fbbf24}
.status-ended .status-dot{background:var(--muted2)}
@keyframes sdpulse{0%,100%{opacity:1}50%{opacity:0.3}}
.status-label{font-size:11px;font-weight:600}
.status-live .status-label{color:#4ade80}
.status-waiting .status-label{color:#fbbf24}
.status-ended .status-label{color:var(--muted)}
.room-card-creator{display:flex;align-items:center;gap:6px;border-top:0.5px solid rgba(255,255,255,0.05);padding-top:7px;margin-top:3px}
.creator-avatar{width:16px;height:16px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.creator-name{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-join-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s}
.room-card:hover .room-join-overlay{background:rgba(0,0,0,0.5);opacity:1}
.room-join-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.rooms-empty{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1}
.rooms-empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── CREATE MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;width:92vw;max-width:500px;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.07);border:none;color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(230,57,70,0.25)}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:9px 14px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.search-res{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;margin-top:6px}
.sitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent}
.sitem:hover{background:var(--bg3)}
.sitem.selected{background:var(--accent-dim);border-color:var(--accent-border)}
.sitem img{width:28px;height:42px;object-fit:cover;border-radius:3px;flex-shrink:0;background:var(--bg4)}
.sitem-title{font-size:12px;font-weight:500}
.sitem-meta{font-size:10px;color:var(--muted);margin-top:1px}
.ep-lang-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:14px}
.ep-in{width:80px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;text-align:center}
.lang-toggle{display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden}
.lang-btn{padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.lang-btn.active{background:var(--accent);color:#fff}
.status-toggle{display:flex;gap:6px;margin-bottom:14px}
.status-btn{flex:1;padding:8px;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:var(--muted);font-family:inherit;transition:all 0.2s;text-align:center}
.status-btn.active-live{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:#4ade80}
.status-btn.active-waiting{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.3);color:#fbbf24}
.submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-top:4px}
.submit-btn:hover{background:#c7303c}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.modal-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.modal-msg.ok{color:#4ade80}
.modal-msg.err{color:var(--accent)}
.login-prompt{text-align:center;padding:1rem;color:var(--muted);font-size:13px}
.login-prompt a{color:var(--accent);text-decoration:none}
.modal-tabs{display:flex;border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;overflow:hidden;margin-bottom:20px}
.modal-tab{flex:1;padding:8px;font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.modal-tab.active{background:var(--accent);color:#fff}

/* ── PLAYER OVERLAY ── */
.player-overlay{display:none;position:fixed;inset:0;z-index:400;flex-direction:column;background:var(--bg)}
.player-overlay.open{display:flex}
.player-nav{height:52px;display:flex;align-items:center;padding:0 1.5rem;gap:12px;background:rgba(8,8,14,0.98);border-bottom:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.player-nav-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.player-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.badge-host{background:var(--accent-dim);color:var(--accent);border:0.5px solid var(--accent-border)}
.badge-guest{background:rgba(255,255,255,0.07);color:var(--muted);border:0.5px solid rgba(255,255,255,0.1)}
.pnav-viewers{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);flex-shrink:0}
.pnav-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:sdpulse 1.5s infinite;flex-shrink:0}
.pnav-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);color:var(--text);border-radius:var(--radius);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.pnav-btn:hover{background:rgba(255,255,255,0.13)}
.player-body{display:flex;flex:1;min-height:0}
.player-col{flex:1;min-width:0;display:flex;flex-direction:column;background:#000}
.player-wrap{flex:1;position:relative}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-top:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.ep-label{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.ep-strip{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none;padding:2px 0}
.ep-strip::-webkit-scrollbar{display:none}
.ep-pill{flex-shrink:0;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:inherit}
.ep-pill:hover{color:var(--text);background:rgba(255,255,255,0.12)}
.ep-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;border-left:0.5px solid rgba(255,255,255,0.07);background:var(--bg2)}
.sidebar-tabs{display:flex;border-bottom:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.stab{flex:1;padding:9px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s;border-bottom:2px solid transparent}
.stab.active{color:var(--text);border-bottom-color:var(--accent)}
.chat-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.chat-msg{display:flex;gap:7px;align-items:flex-start}
.chat-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.chat-body{flex:1;min-width:0}
.chat-name{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:1px}
.chat-name.host-name{color:#fbbf24}
.chat-text{font-size:12px;line-height:1.5;word-break:break-word;color:rgba(240,240,248,0.85)}
.chat-system{font-size:10px;color:var(--muted2);text-align:center;padding:3px 0;font-style:italic}
.chat-input-wrap{display:flex;gap:7px;padding:9px 10px;border-top:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:7px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.2s;flex-shrink:0}
.chat-send:hover{background:#c7303c}
.viewers-wrap{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.viewer-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,0.03)}
.viewer-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--bg3)}
.viewer-name{font-size:12px;font-weight:500;flex:1}
.guest-bar{padding:8px 14px;background:var(--accent-dim);border-bottom:0.5px solid var(--accent-border);font-size:11px;color:rgba(240,240,248,0.8);display:flex;align-items:center;gap:7px;flex-shrink:0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 18px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{opacity:1}

@media(max-width:768px){
  .sidebar{display:none}
  .top-nav,.player-nav{padding:0 1rem}
  .browse-page{padding:70px 1rem 3rem}
  .rooms-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
}
</style>
</head>
<body>

<!-- BROWSE NAV -->
<nav class="top-nav" id="browseNav">
  <a href="https://anicast.watch" class="nav-logo-img">
    <img src="https://raw.githubusercontent.com/yeonvvx/AniCastImages/main/Logo/AniCast.png" alt="AniCast" height="30" style="display:block;height:30px;width:auto;object-fit:contain">
  </a>
  <div class="nav-sep"></div>
  <a href="https://anicast.watch" class="nav-back">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    AniCast
  </a>
  <div class="nav-sep"></div>
  <span class="nav-title">WATCH <em>PARTY</em></span>
  <div class="nav-right-area">
    <div class="nav-user-chip" id="navUserChip"></div>
  </div>
</nav>

<!-- BROWSE PAGE -->
<div class="browse-page" id="browsePage">
  <div class="browse-header">
    <div class="browse-title">COMMUNITY <em>ROOMS</em></div>
    <div class="header-actions">
      <div class="tab-btns">
        <button class="tab-btn active" onclick="setFilter('all',this)">All</button>
        <button class="tab-btn" onclick="setFilter('live',this)">🟢 Live</button>
        <button class="tab-btn" onclick="setFilter('waiting',this)">🟡 Waiting</button>
        <button class="tab-btn" onclick="setFilter('ended',this)">⚫ Ended</button>
      </div>
      <button class="create-top-btn" onclick="openCreateModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Room
      </button>
    </div>
  </div>
  <div class="filter-bar">
    <span style="font-size:11px;color:var(--muted)">Sort:</span>
    <button class="filter-pill active" onclick="setSort('newest',this)">Newest</button>
    <button class="filter-pill" onclick="setSort('live_first',this)">Live First</button>
    <div class="rooms-count" id="roomsCount"></div>
  </div>
  <div class="rooms-grid" id="roomsGrid"></div>
</div>

<!-- CREATE/JOIN MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeCreateModal()">✕</button>
    <div class="modal-title">WATCH PARTY</div>
    <p class="modal-sub">Create a room or join an existing one.</p>
    <div class="modal-tabs">
      <button class="modal-tab active" id="mtCreate" onclick="switchModalTab('create')">Create Room</button>
      <button class="modal-tab" id="mtJoin" onclick="switchModalTab('join')">Join by ID</button>
    </div>

    <!-- CREATE FORM -->
    <div id="modalCreateForm">
      <div id="modalLoginPrompt" class="login-prompt" style="display:none">
        <a href="https://anicast.watch">Sign in on AniCast</a> to create rooms and save your party history.
        <div style="margin-top:10px;font-size:11px;color:var(--muted2)">Or continue as guest below ↓</div>
      </div>
      <div class="field">
        <label>Search Anime</label>
        <input type="text" id="modalSearch" placeholder="e.g. One Piece, Jujutsu Kaisen…" autocomplete="off">
        <div class="search-res" id="modalResults"></div>
      </div>
      <div id="modalSelectedInfo" style="display:none;background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--muted)"></div>
      <div class="ep-lang-row">
        <div>
          <label style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px">Episode</label>
          <input class="ep-in" type="number" id="modalEp" value="1" min="1">
        </div>
        <div>
          <label style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px">Language</label>
          <div class="lang-toggle">
            <button class="lang-btn active" id="mlSub" onclick="setModalLang('sub')">SUB</button>
            <button class="lang-btn" id="mlDub" onclick="setModalLang('dub')">DUB</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Room Status</label>
        <div class="status-toggle">
          <button class="status-btn active-live" id="msBtnLive" onclick="setModalStatus('live')">🟢 Live Now</button>

<script>
const SUPABASE_URL='https://cwsmcrqfxhloyzfczpoo.supabase.co';
const SUPABASE_KEY='sb_publishable_oqiDI9aRF4SoudJVTeywrQ_O9sjL4Y8';
const JIKAN='https://api.jikan.moe/v4';
const MEGAPLAY='https://megaplay.buzz/stream/mal';

let sb=null, currentUser=null, currentRoom=null;
let isHost=false, modalLang='sub', modalStatus='live', modalAnime=null;
let modalSearchTimer=null, allRooms=[], filterStatus='all', sortMode='newest';
let roomChannel=null, chatChannel=null;
let currentEp=1, currentLang='sub', viewers={};

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function getSB(){
  if(sb) return sb;
  const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  sb=createClient(SUPABASE_URL,SUPABASE_KEY);
  return sb;
}
async function jikan(path,params={}){
  const url=new URL(JIKAN+path);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  for(let a=0;a<3;a++){
    try{
      const r=await fetch(url.toString());
      if(r.status===429){await sleep(2000*(a+1));continue;}
      if(!r.ok) return {};
      return await r.json();
    }catch{return {};}
  }
  return {};
}
function getDisplayName(user){return user?.user_metadata?.username||user?.email?.split('@')[0]||'Guest_'+Math.random().toString(36).slice(2,5);}
function getAvatarUrl(user){
  if(user?.user_metadata?.avatar_url) return user.user_metadata.avatar_url;
  const seed=user?.user_metadata?.username||user?.email?.split('@')[0]||'guest';
  return `https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(seed)}&radius=50&backgroundColor=b6e3f4,c0aede,d1d4f9`;
}
function genId(){return Math.random().toString(36).slice(2,9);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getTimeAgo(ts){
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

/* ── INIT ── */
async function init(){
  renderSkeletons();
  const client=await getSB();
  const{data:{session}}=await client.auth.getSession();
  if(session?.user){currentUser=session.user; renderNavUser();}
  await loadRooms();

  // Check URL for room param
  const params=new URLSearchParams(window.location.search);
  const roomId=params.get('room');
  const mal=params.get('mal');
  if(roomId){await enterRoom(roomId,false);}
  else if(mal){
    openCreateModal();
    const data=await jikan('/anime/'+mal);
    if(data?.data) selectModalAnime(data.data);
  }

  // Realtime rooms updates
  client.channel('party_rooms_changes').on('postgres_changes',{event:'*',schema:'public',table:'party_rooms'},()=>loadRooms()).subscribe();

  // Inputs
  document.getElementById('modalSearch').addEventListener('input',function(){
    clearTimeout(modalSearchTimer);
    if(this.value.trim().length>1) modalSearchTimer=setTimeout(()=>modalSearch(this.value.trim()),500);
    else document.getElementById('modalResults').innerHTML='';
  });
  document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
  document.getElementById('joinRoomInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoomById();});
  document.getElementById('createModal').addEventListener('click',e=>{if(e.target===document.getElementById('createModal'))closeCreateModal();});
}

function renderNavUser(){
  const el=document.getElementById('navUserChip');
  if(!currentUser){el.innerHTML='';return;}
  const name=getDisplayName(currentUser);
  const av=getAvatarUrl(currentUser);
  el.innerHTML=`<img src="${av}" onerror="this.style.display='none'" style="width:24px;height:24px;border-radius:50%;object-fit:cover"><span>${name}</span>`;
}

/* ── ROOMS BROWSER ── */
function renderSkeletons(){
  const grid=document.getElementById('roomsGrid');
  grid.innerHTML='';
  for(let i=0;i<12;i++){
    const d=document.createElement('div');
    d.style.cssText='border-radius:10px;overflow:hidden;background:var(--bg2)';
    d.innerHTML=`<div class="skel" style="width:100%;aspect-ratio:2/3"></div><div style="padding:10px 12px 12px"><div class="skel" style="height:12px;width:80%;margin-bottom:8px"></div><div class="skel" style="height:10px;width:50%"></div></div>`;
    grid.appendChild(d);
  }
}

async function loadRooms(){
  const client=await getSB();
  const{data,error}=await client.from('party_rooms').select('*').order('updated_at',{ascending:false}).limit(100);
  if(error){console.error(error);return;}
  allRooms=data||[];
  renderRooms();
}

function setFilter(status,btn){
  filterStatus=status;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRooms();
}
function setSort(mode,btn){
  sortMode=mode;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRooms();
}

function renderRooms(){
  let rooms=[...allRooms];
  if(filterStatus!=='all') rooms=rooms.filter(r=>r.status===filterStatus);
  if(sortMode==='live_first'){
    const order={live:0,waiting:1,ended:2};
    rooms.sort((a,b)=>(order[a.status]??3)-(order[b.status]??3));
  }
  const grid=document.getElementById('roomsGrid');
  document.getElementById('roomsCount').textContent=`${rooms.length} room${rooms.length!==1?'s':''}`;
  grid.innerHTML='';
  if(!rooms.length){
    grid.innerHTML=`<div class="rooms-empty"><div class="rooms-empty-icon">🎌</div><p>No rooms yet.<br>Be the first to create one!</p></div>`;
    return;
  }
  rooms.forEach(room=>grid.appendChild(mkRoomCard(room)));
}

function mkRoomCard(room){
  const sc=`status-${room.status}`;
  const sl=room.status==='live'?'Live':room.status==='waiting'?'Waiting':'Ended';
  const avSrc=room.avatar_url||`https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(room.host_name||'anon')}&radius=50`;
  const card=document.createElement('div');
  card.className='room-card';
  card.innerHTML=`
    <img class="room-card-poster" src="${room.anime_image||''}" alt="" loading="lazy" onerror="this.style.background='var(--bg3)'">
    <div class="room-card-body">
      <div class="room-card-title">${escHtml(room.anime_title||'Unknown')}</div>
      <div class="room-card-badges">
        <span class="badge badge-ep">EP ${room.episode||1}</span>
        <span class="badge badge-${room.lang||'sub'}">${(room.lang||'sub').toUpperCase()}</span>
      </div>
      <div class="room-card-status ${sc}">
        <div class="status-dot"></div>
        <span class="status-label">${sl}</span>
        <span style="font-size:10px;color:var(--muted2);margin-left:auto">${getTimeAgo(room.updated_at)}</span>
      </div>
      <div class="room-card-creator">
        <img class="creator-avatar" src="${avSrc}" alt="" onerror="this.style.background='var(--bg3)'">
        <span class="creator-name">${escHtml(room.host_name||'Anonymous')}</span>
      </div>
    </div>
    <div class="room-join-overlay"><div class="room-join-btn">Join Room</div></div>`;
  card.onclick=()=>enterRoom(room.id,false);
  return card;
}

/* ── CREATE/JOIN MODAL ── */
function openCreateModal(){
  document.getElementById('createModal').classList.add('open');
  document.body.style.overflow='hidden';
  if(!currentUser) document.getElementById('modalLoginPrompt').style.display='block';
}
function closeCreateModal(){
  document.getElementById('createModal').classList.remove('open');
  document.body.style.overflow='';
}
function switchModalTab(tab){
  document.getElementById('mtCreate').classList.toggle('active',tab==='create');
  document.getElementById('mtJoin').classList.toggle('active',tab==='join');
  document.getElementById('modalCreateForm').style.display=tab==='create'?'block':'none';
  document.getElementById('modalJoinForm').style.display=tab==='join'?'block':'none';
}
function setModalLang(l){
  modalLang=l;
  document.getElementById('mlSub').classList.toggle('active',l==='sub');
  document.getElementById('mlDub').classList.toggle('active',l==='dub');
}
function setModalStatus(s){
  modalStatus=s;
  document.getElementById('msBtnLive').className='status-btn'+(s==='live'?' active-live':'');
  document.getElementById('msBtnWaiting').className='status-btn'+(s==='waiting'?' active-waiting':'');
}

async function modalSearch(q){
  const list=document.getElementById('modalResults');
  list.innerHTML='<div style="font-size:11px;color:var(--muted);padding:6px">Searching…</div>';
  const data=await jikan('/anime',{q,limit:6});
  const items=data?.data||[];
  list.innerHTML='';
  if(!items.length){list.innerHTML='<div style="font-size:11px;color:var(--muted);padding:6px">No results.</div>';return;}
  items.forEach(anime=>{
    const title=anime.title_english||anime.title||'';
    const img=anime.images?.jpg?.image_url||'';
    const div=document.createElement('div');
    div.className='sitem'+(modalAnime?.mal_id===anime.mal_id?' selected':'');
    div.innerHTML=`<img src="${img}" alt="" onerror="this.style.display='none'"><div><div class="sitem-title">${escHtml(title)}</div><div class="sitem-meta">${anime.type||'TV'} · ${anime.year||''} · ${anime.episodes||'?'} eps</div></div>`;
    div.onclick=()=>selectModalAnime(anime);
    list.appendChild(div);
  });
}

function selectModalAnime(anime){
  modalAnime=anime;
  const title=anime.title_english||anime.title||'';
  document.querySelectorAll('.sitem').forEach(el=>el.classList.toggle('selected',el.querySelector('.sitem-title')?.textContent===title));
  const info=document.getElementById('modalSelectedInfo');
  info.style.display='block';
  info.innerHTML=`<strong style="color:var(--text)">${escHtml(title)}</strong> · ${anime.episodes||'?'} eps`;
  if(anime.episodes) document.getElementById('modalEp').max=anime.episodes;
  document.getElementById('modalSearch').value=title;
  document.getElementById('modalResults').innerHTML='';
  document.getElementById('modalSubmitBtn').disabled=false;
}

async function createRoom(){
  if(!modalAnime) return;
  const btn=document.getElementById('modalSubmitBtn');
  const msg=document.getElementById('modalMsg');
  btn.disabled=true; btn.textContent='Creating…'; msg.textContent='';
  const ep=parseInt(document.getElementById('modalEp').value)||1;
  const roomId=genId();
  const client=await getSB();
  const name=currentUser?getDisplayName(currentUser):'Host_'+genId().slice(0,4);
  const avatar=currentUser?getAvatarUrl(currentUser):'';
  const{error}=await client.from('party_rooms').insert({
    id:roomId,
    anime_mal_id:modalAnime.mal_id,
    anime_title:modalAnime.title_english||modalAnime.title||'',
    anime_image:modalAnime.images?.jpg?.large_image_url||modalAnime.images?.jpg?.image_url||'',
    episode:ep, lang:modalLang, status:modalStatus,
    is_playing:true, playback_time:0,
    host_id:currentUser?.id||null, host_name:name, avatar_url:avatar
  });
  if(error){msg.textContent=error.message;msg.className='modal-msg err';btn.disabled=false;btn.textContent='Create Room';return;}
  closeCreateModal();
  await enterRoom(roomId,true);
  btn.disabled=false; btn.textContent='Create Room';
}

async function joinRoomById(){
  let input=document.getElementById('joinRoomInput').value.trim();
  const msg=document.getElementById('joinMsg');
  const match=input.match(/[?&]room=([a-z0-9]+)/);
  if(match) input=match[1];
  if(!input){msg.textContent='Enter a room ID or link.';msg.className='modal-msg err';return;}
  msg.textContent='Joining…';msg.className='modal-msg';
  closeCreateModal();
  await enterRoom(input,false);
}

/* ── PLAYER ── */
async function enterRoom(roomId,asHost){
  const client=await getSB();
  const{data:room,error}=await client.from('party_rooms').select('*').eq('id',roomId).single();
  if(error||!room){
    showToast('Room not found.');
    return;
  }
  currentRoom=room;
  isHost=asHost||(currentUser&&room.host_id===currentUser.id);
  currentEp=room.episode; currentLang=room.lang;
  window.history.replaceState({},'','/w2g?room='+roomId);

  // Show player
  document.getElementById('browsePage').style.display='none';
  document.getElementById('browseNav').style.display='none';
  document.getElementById('playerOverlay').classList.add('open');

  // Nav info
  document.getElementById('pNavTitle').textContent=room.anime_title+' — EP '+room.episode;
  const badge=document.getElementById('pNavBadge');
  badge.textContent=isHost?'Host':'Guest';
  badge.className='player-badge '+(isHost?'badge-host':'badge-guest');
  document.getElementById('guestBar').style.display=isHost?'none':'flex';

  // Load video
  document.getElementById('playerFrame').src=`${MEGAPLAY}/${room.anime_mal_id}/${room.episode}/${room.lang}`;

  // Host controls
  if(isHost){
    document.getElementById('playerBar').style.display='flex';
    document.getElementById('pBtnSub').classList.toggle('active',room.lang==='sub');
    document.getElementById('pBtnDub').classList.toggle('active',room.lang==='dub');
    buildEpStrip(room.anime_mal_id, room.episode);
  }

  // Subscribe
  subscribeRoom(roomId);
  subscribeChat(roomId);
  await loadChatHistory(roomId);
  addSystemMsg('You joined the room 🎌');
}

async function buildEpStrip(malId,activeEp){
  const strip=document.getElementById('epStrip');
  strip.innerHTML='';
  const data=await jikan('/anime/'+malId);
  const total=Math.min(data?.data?.episodes||activeEp||24,500);
  for(let i=1;i<=total;i++){
    const btn=document.createElement('button');
    btn.className='ep-pill'+(i===activeEp?' active':'');
    btn.textContent=i;
    btn.onclick=()=>changeEp(i);
    strip.appendChild(btn);
  }
  setTimeout(()=>{const a=strip.querySelector('.ep-pill.active');if(a)a.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});},100);
}

async function changeEp(ep){
  if(!isHost) return;
  currentEp=ep;
  document.querySelectorAll('.ep-pill').forEach(b=>b.classList.toggle('active',+b.textContent===ep));
  document.getElementById('playerFrame').src=`${MEGAPLAY}/${currentRoom.anime_mal_id}/${ep}/${currentLang}`;
  document.getElementById('pNavTitle').textContent=currentRoom.anime_title+' — EP '+ep;
  // Broadcast instantly to all guests
  if(roomChannel) await roomChannel.send({type:'broadcast',event:'sync',payload:{episode:ep,lang:currentLang}});
  // Also update DB for persistence
  const client=await getSB();
  await client.from('party_rooms').update({episode:ep,playback_time:0,updated_at:new Date().toISOString()}).eq('id',currentRoom.id);
  addSystemMsg(`Host changed to Episode ${ep}`);
}

async function changeEpLang(lang){
  if(!isHost) return;
  currentLang=lang;
  document.getElementById('pBtnSub').classList.toggle('active',lang==='sub');
  document.getElementById('pBtnDub').classList.toggle('active',lang==='dub');
  document.getElementById('playerFrame').src=`${MEGAPLAY}/${currentRoom.anime_mal_id}/${currentEp}/${lang}`;
  // Broadcast instantly to all guests
  if(roomChannel) await roomChannel.send({type:'broadcast',event:'sync',payload:{episode:currentEp,lang}});
  const client=await getSB();
  await client.from('party_rooms').update({lang,updated_at:new Date().toISOString()}).eq('id',currentRoom.id);
  addSystemMsg(`Host switched to ${lang.toUpperCase()}`);
}

/* ── REALTIME ── */
async function subscribeRoom(roomId){
  const client=await getSB();
  roomChannel=client.channel('room:'+roomId)
    // Broadcast for instant host→guest sync (no DB config needed)
    .on('broadcast',{event:'sync'},({payload})=>{
      if(isHost) return;
      if(payload.episode!==currentEp||payload.lang!==currentLang){
        currentEp=payload.episode; currentLang=payload.lang;
        document.getElementById('playerFrame').src=`${MEGAPLAY}/${currentRoom.anime_mal_id}/${payload.episode}/${payload.lang}`;
        document.getElementById('pNavTitle').textContent=currentRoom.anime_title+' — EP '+payload.episode;
        addSystemMsg(`Host changed to Episode ${payload.episode} · ${payload.lang.toUpperCase()}`);
      }
    })
    // Guest joining: ask host for current state
    .on('broadcast',{event:'request_sync'},async()=>{
      if(!isHost) return;
      await roomChannel.send({type:'broadcast',event:'sync',payload:{episode:currentEp,lang:currentLang}});
    })
    // DB changes as fallback
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'party_rooms',filter:`id=eq.${roomId}`},payload=>{
      if(isHost) return;
      const room=payload.new;
      if(room.episode!==currentEp||room.lang!==currentLang){
        currentEp=room.episode; currentLang=room.lang;
        document.getElementById('playerFrame').src=`${MEGAPLAY}/${currentRoom.anime_mal_id}/${room.episode}/${room.lang}`;
        document.getElementById('pNavTitle').textContent=currentRoom.anime_title+' — EP '+room.episode;
        addSystemMsg(`Host changed to Episode ${room.episode} · ${room.lang.toUpperCase()}`);
      }
    })
    .subscribe(async(status)=>{
      if(status==='SUBSCRIBED' && !isHost){
        // Request current state from host on join
        await roomChannel.send({type:'broadcast',event:'request_sync',payload:{}});
      }
    });
}

async function subscribeChat(roomId){
  const client=await getSB();
  chatChannel=client.channel('chat:'+roomId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'party_messages',filter:`room_id=eq.${roomId}`},payload=>renderMessage(payload.new))
    .on('presence',{event:'sync'},()=>{
      const state=chatChannel.presenceState();
      updateViewers(state);
    })
    .on('presence',{event:'join'},({newPresences})=>newPresences.forEach(p=>addSystemMsg(`${p.name} joined`)))
    .on('presence',{event:'leave'},({leftPresences})=>leftPresences.forEach(p=>addSystemMsg(`${p.name} left`)))
    .subscribe(async status=>{
      if(status==='SUBSCRIBED'){
        const name=currentUser?getDisplayName(currentUser):'Guest_'+Math.random().toString(36).slice(2,5);
        const avatar=currentUser?getAvatarUrl(currentUser):'';
        await chatChannel.track({name,avatar,isHost});
      }
    });
}

function updateViewers(state){
  viewers={};
  Object.values(state).forEach(presences=>presences.forEach(p=>{viewers[p.name]=p;}));
  document.getElementById('pViewerCount').textContent=Object.keys(viewers).length||1;
  renderViewers();
}
function renderViewers(){
  const wrap=document.getElementById('viewersPanel');
  wrap.innerHTML='';
  Object.values(viewers).forEach(v=>{
    const div=document.createElement('div');
    div.className='viewer-item';
    div.innerHTML=`<img class="viewer-avatar" src="${v.avatar||`https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(v.name)}&radius=50`}" alt="" onerror="this.style.background='var(--bg3)'"><span class="viewer-name">${escHtml(v.name)}</span>${v.isHost?'<span class="player-badge badge-host" style="font-size:9px;padding:2px 7px">Host</span>':''}`;
    wrap.appendChild(div);
  });
}

/* ── CHAT ── */
async function loadChatHistory(roomId){
  const client=await getSB();
  const{data}=await client.from('party_messages').select('*').eq('room_id',roomId).order('created_at',{ascending:true}).limit(50);
  (data||[]).forEach(renderMessage);
}
function renderMessage(msg){
  const wrap=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='chat-msg';
  const av=msg.avatar_url||`https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(msg.username||'anon')}&radius=50`;
  const isHostMsg=msg.username===currentRoom?.host_name;
  div.innerHTML=`<img class="chat-avatar" src="${av}" alt="" onerror="this.style.background='var(--bg3)'"><div class="chat-body"><div class="chat-name ${isHostMsg?'host-name':''}">${escHtml(msg.username||'Anon')}${isHostMsg?' 👑':''}</div><div class="chat-text">${escHtml(msg.message)}</div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}
function addSystemMsg(text){
  const wrap=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='chat-system'; div.textContent=text;
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}
async function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||!currentRoom) return;
  input.value='';
  const client=await getSB();
  const name=currentUser?getDisplayName(currentUser):'Guest_'+Math.random().toString(36).slice(2,5);
  const avatar=currentUser?getAvatarUrl(currentUser):'';
  await client.from('party_messages').insert({room_id:currentRoom.id,user_id:currentUser?.id||null,username:name,avatar_url:avatar,message:text});
}

/* ── LEAVE ── */
function leaveRoom(){
  if(roomChannel) roomChannel.unsubscribe();
  if(chatChannel) chatChannel.unsubscribe();
  roomChannel=null; chatChannel=null;
  window.history.replaceState({},'','/w2g');
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('browsePage').style.display='';
  document.getElementById('browseNav').style.display='flex';
  document.getElementById('playerFrame').src='';
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('epStrip').innerHTML='';
  currentRoom=null; isHost=false;
}

/* ── UI UTILS ── */
function switchSideTab(tab){
  document.getElementById('stChat').classList.toggle('active',tab==='chat');
  document.getElementById('stViewers').classList.toggle('active',tab==='viewers');
  document.getElementById('chatPanel').style.display=tab==='chat'?'flex':'none';
  document.getElementById('viewersPanel').style.display=tab==='viewers'?'flex':'none';
}
function shareRoom(){
  const url=`https://anicast.watch/w2g?room=${currentRoom?.id}`;
  navigator.clipboard.writeText(url).then(()=>showToast('Room link copied! Share with friends 🎌'));
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

init();
</script>
