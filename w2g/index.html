<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party — AniCast</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/yeonvvx/AniCastImages/main/Logo/anicast%20logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#e63946;--accent-dim:rgba(230,57,70,0.18);--accent-border:rgba(230,57,70,0.35);
  --bg:#08080e;--bg2:#101018;--bg3:#181825;--bg4:#20202e;
  --text:#f0f0f8;--muted:#7a7a96;--muted2:#545470;
  --radius:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{height:3px;width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;padding:0 2.5rem;height:60px;background:rgba(8,8,14,0.97);backdrop-filter:blur(16px);border-bottom:0.5px solid rgba(255,255,255,0.07);gap:16px}
.nav-logo-img{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-back{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--text)}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,0.1)}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--text)}
.nav-title em{color:var(--accent);font-style:normal}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-user{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
.nav-user img{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.12)}

/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:76px 2.5rem 4rem}

/* TABS */
.tabs-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,4vw,46px);letter-spacing:2px}
.page-title em{color:var(--accent);font-style:normal}
.tab-btns{display:flex;gap:0;border:0.5px solid rgba(255,255,255,0.1);border-radius:7px;overflow:hidden}
.tab-btn{padding:7px 18px;font-size:12px;font-weight:600;letter-spacing:0.5px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.create-top-btn{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s}
.create-top-btn:hover{background:#c7303c}

/* ROOMS GRID */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.room-card{background:var(--bg2);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s;position:relative}
.room-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15)}
.room-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3)}
.room-card-body{padding:10px 12px 12px}
.room-card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.room-card-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.badge-sub{background:rgba(59,130,246,0.2);color:#60a5fa;border:0.5px solid rgba(59,130,246,0.3)}
.badge-dub{background:rgba(245,158,11,0.2);color:#fbbf24;border:0.5px solid rgba(245,158,11,0.3)}
.badge-ep{background:rgba(255,255,255,0.08);color:var(--muted);border:0.5px solid rgba(255,255,255,0.1)}
.room-card-status{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-live .status-dot{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.6);animation:pulse 1.5s infinite}
.status-waiting .status-dot{background:#fbbf24}
.status-ended .status-dot{background:var(--muted2)}
.status-label{font-size:11px;font-weight:600}
.status-live .status-label{color:#4ade80}
.status-waiting .status-label{color:#fbbf24}
.status-ended .status-label{color:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.room-card-creator{display:flex;align-items:center;gap:6px;border-top:0.5px solid rgba(255,255,255,0.06);padding-top:8px;margin-top:4px}
.creator-avatar{width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.creator-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-join-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s}
.room-card:hover .room-join-overlay{background:rgba(0,0,0,0.45);opacity:1}
.room-join-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;pointer-events:none}
.rooms-empty{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1}
.rooms-empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.rooms-empty p{font-size:14px;line-height:1.7}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--muted);font-family:inherit;transition:all 0.2s}
.filter-pill.active,.filter-pill:hover{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.rooms-count{font-size:12px;color:var(--muted);margin-left:auto}

/* CREATE PANEL */
.create-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.create-panel.open{display:flex}
.create-box{background:var(--bg2);border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;width:92vw;max-width:520px;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.create-box-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.create-box-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.create-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.07);border:none;color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.create-close:hover{background:rgba(230,57,70,0.25)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:9px 14px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.search-results-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;margin-top:6px}
.sri{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent}
.sri:hover{background:var(--bg3)}
.sri.selected{background:var(--accent-dim);border-color:var(--accent-border)}
.sri img{width:30px;height:44px;object-fit:cover;border-radius:3px;flex-shrink:0;background:var(--bg4)}
.sri-title{font-size:12px;font-weight:500}
.sri-meta{font-size:10px;color:var(--muted);margin-top:2px}
.ep-lang-row{display:flex;gap:12px;align-items:center}
.ep-input{width:80px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;text-align:center}
.lang-toggle{display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden}
.lang-btn{padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.lang-btn.active{background:var(--accent);color:#fff}
.status-toggle{display:flex;gap:6px}
.status-btn{flex:1;padding:8px;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:var(--muted);font-family:inherit;transition:all 0.2s;text-align:center}
.status-btn.active-live{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:#4ade80}
.status-btn.active-waiting{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.3);color:#fbbf24}
.submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-top:8px}
.submit-btn:hover{background:#c7303c}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.create-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.create-msg.ok{color:#4ade80}
.create-msg.err{color:var(--accent)}
.login-prompt{text-align:center;padding:1.5rem;color:var(--muted);font-size:13px}
.login-prompt a{color:var(--accent);text-decoration:none}

/* JOIN MODAL */
.join-modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);flex-direction:column}
.join-modal.open{display:flex}
.join-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.join-header-info{display:flex;align-items:center;gap:12px}
.join-header-poster{width:32px;height:48px;object-fit:cover;border-radius:4px;background:var(--bg3)}
.join-header-title{font-size:14px;font-weight:600}
.join-header-meta{font-size:11px;color:var(--muted);margin-top:2px}
.join-header-right{display:flex;align-items:center;gap:10px}
.join-share-row{display:flex;gap:6px}
.join-share-input{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:6px 12px;font-size:11px;color:var(--muted);font-family:inherit;outline:none;width:240px}
.join-copy-btn{background:rgba(255,255,255,0.1);color:var(--text);border:0.5px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.join-copy-btn:hover{background:rgba(255,255,255,0.18)}
.join-copy-btn.copied{color:#4ade80}
.join-close{background:rgba(255,255,255,0.07);border:none;color:var(--text);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.join-close:hover{background:rgba(230,57,70,0.25)}
.join-embed{flex:1;background:#000}
.join-embed iframe{width:100%;height:100%;border:none;display:block}

.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  .page{padding:70px 1rem 3rem}
  nav{padding:0 1rem}
  .rooms-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .tabs-row{flex-direction:column;align-items:flex-start}
  .join-share-input{width:140px}
}
</style>
</head>
<body>

<nav>
  <a href="https://anicast.watch" class="nav-logo-img">
    <img src="https://raw.githubusercontent.com/yeonvvx/AniCastImages/main/Logo/AniCast.png" alt="AniCast" height="32" style="display:block;height:32px;width:auto;object-fit:contain">
  </a>
  <div class="nav-sep"></div>
  <a href="https://anicast.watch" class="nav-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    AniCast
  </a>
  <div class="nav-title">WATCH <em>PARTY</em></div>
  <div class="nav-right">
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<div class="page">
  <div class="tabs-row">
    <div class="page-title">COMMUNITY <em>ROOMS</em></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="tab-btns">
        <button class="tab-btn active" onclick="setFilter('all',this)">All</button>
        <button class="tab-btn" onclick="setFilter('live',this)">🟢 Live</button>
        <button class="tab-btn" onclick="setFilter('waiting',this)">🟡 Waiting</button>
        <button class="tab-btn" onclick="setFilter('ended',this)">⚫ Ended</button>
      </div>
      <button class="create-top-btn" onclick="openCreate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Room
      </button>
    </div>
  </div>

  <div class="filter-bar">
    <span style="font-size:12px;color:var(--muted)">Sort:</span>
    <button class="filter-pill active" onclick="setSort('newest',this)">Newest</button>
    <button class="filter-pill" onclick="setSort('live_first',this)">Live First</button>
    <div class="rooms-count" id="roomsCount"></div>
  </div>

  <div class="rooms-grid" id="roomsGrid">
    <!-- skeletons -->
  </div>
</div>

<!-- CREATE PANEL -->
<div class="create-panel" id="createPanel">
  <div class="create-box">
    <button class="create-close" onclick="closeCreate()">✕</button>
    <div class="create-box-title">CREATE ROOM</div>
    <div class="create-box-sub">Pick an anime, set your episode and language, then go live.</div>
    <div id="createLoginPrompt" class="login-prompt" style="display:none">
      You need to be signed in to create a room.<br><br>
      <a href="https://anicast.watch">Sign in on AniCast →</a>
    </div>
    <div id="createForm">
      <div class="field">
        <label>Search Anime</label>
        <input type="text" id="createSearch" placeholder="e.g. One Piece, Naruto…" autocomplete="off">
        <div class="search-results-list" id="createResults"></div>
      </div>
      <div class="field">
        <label>Episode & Language</label>
        <div class="ep-lang-row">
          <input class="ep-input" type="number" id="createEp" value="1" min="1" placeholder="EP">
          <div class="lang-toggle">
            <button class="lang-btn active" id="clBtnSub" onclick="setCLang('sub')">SUB</button>
            <button class="lang-btn" id="clBtnDub" onclick="setCLang('dub')">DUB</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Room Status</label>
        <div class="status-toggle">
          <button class="status-btn active-live" id="clBtnLive" onclick="setCStatus('live')">🟢 Live Now</button>
          <button class="status-btn" id="clBtnWaiting" onclick="setCStatus('waiting')">🟡 Waiting</button>
        </div>
      </div>
      <div id="createSelectedInfo" style="display:none;background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--muted)"></div>
      <button class="submit-btn" id="createSubmitBtn" onclick="submitRoom()" disabled>Create Watch Party</button>
      <div class="create-msg" id="createMsg"></div>
    </div>
  </div>
</div>

<!-- JOIN MODAL -->
<div class="join-modal" id="joinModal">
  <div class="join-header">
    <div class="join-header-info">
      <img class="join-header-poster" id="joinPoster" src="" alt="">
      <div>
        <div class="join-header-title" id="joinTitle">—</div>
        <div class="join-header-meta" id="joinMeta">—</div>
      </div>
    </div>
    <div class="join-header-right">
      <div class="join-share-row">
        <input class="join-share-input" id="joinShareInput" readonly placeholder="Room link">
        <button class="join-copy-btn" id="joinCopyBtn" onclick="copyJoinLink()">Copy Link</button>
      </div>
      <button class="join-close" onclick="closeJoin()">✕</button>
    </div>
  </div>
  <div class="join-embed">
    <iframe id="joinIframe" src="" allowfullscreen allow="autoplay;fullscreen" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"></iframe>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cwsmcrqfxhloyzfczpoo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oqiDI9aRF4SoudJVTeywrQ_O9sjL4Y8';
const JIKAN = 'https://api.jikan.moe/v4';
const MEGAPLAY = 'https://megaplay.buzz/stream/mal';
const W2G_KEY = 'x304r5ccqia9dy4dfp4v5oqkr0vlkp1yx6orzp4tk2sohkyyd0t64hegai6bdrrw';
const CORS = 'https://corsproxy.io/?url=';

let sb = null;
let currentUser = null;
let allRooms = [];
let filterStatus = 'all';
let sortMode = 'newest';
let createLang = 'sub';
let createStatus = 'live';
let createSelectedAnime = null;
let searchTimer = null;

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function getSB() {
  if (sb) return sb;
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  return sb;
}

async function jikan(path, params = {}) {
  const url = new URL(JIKAN + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  for (let a = 0; a < 3; a++) {
    try {
      const r = await fetch(url.toString());
      if (r.status === 429) { await sleep(2000 * (a + 1)); continue; }
      if (!r.ok) return {};
      return await r.json();
    } catch { return {}; }
  }
  return {};
}

function getAvatarUrl(user) {
  if (user?.user_metadata?.avatar_url) return user.user_metadata.avatar_url;
  const seed = user?.user_metadata?.username || user?.email?.split('@')[0] || 'guest';
  return `https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(seed)}&radius=50&backgroundColor=b6e3f4,c0aede,d1d4f9`;
}
function getDisplayName(user) {
  return user?.user_metadata?.username || user?.email?.split('@')[0] || 'Anon';
}

/* ── INIT ── */
async function init() {
  renderSkeletons();
  const client = await getSB();
  const { data: { session } } = await client.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    renderNavUser();
  }
  await loadRooms();

  // Auto-fill from URL params (coming from main site)
  const params = new URLSearchParams(window.location.search);
  const mal = params.get('mal');
  if (mal) {
    setTimeout(async () => {
      openCreate();
      const data = await jikan('/anime/' + mal);
      if (data?.data) selectCreateAnime(data.data);
    }, 300);
  }

  // Realtime subscription
  client.channel('watch_rooms').on('postgres_changes', { event: '*', schema: 'public', table: 'watch_rooms' }, () => loadRooms()).subscribe();

  // Search input
  document.getElementById('createSearch').addEventListener('input', function () {
    clearTimeout(searchTimer);
    if (this.value.trim().length > 1) searchTimer = setTimeout(() => createSearchAnime(this.value.trim()), 500);
    else document.getElementById('createResults').innerHTML = '';
  });
}

function renderNavUser() {
  const el = document.getElementById('navUser');
  if (!currentUser) { el.innerHTML = ''; return; }
  const name = getDisplayName(currentUser);
  const av = getAvatarUrl(currentUser);
  el.innerHTML = `<img src="${av}" onerror="this.style.display='none'"><span>${name}</span>`;
}

function renderSkeletons() {
  const grid = document.getElementById('roomsGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const d = document.createElement('div');
    d.style.cssText = 'border-radius:10px;overflow:hidden;background:var(--bg2)';
    d.innerHTML = `<div class="skel" style="width:100%;aspect-ratio:2/3"></div><div style="padding:10px 12px 12px"><div class="skel" style="height:12px;width:80%;margin-bottom:8px"></div><div class="skel" style="height:10px;width:50%"></div></div>`;
    grid.appendChild(d);
  }
}

/* ── LOAD ROOMS ── */
async function loadRooms() {
  const client = await getSB();
  const { data, error } = await client.from('watch_rooms').select('*').order('created_at', { ascending: false }).limit(100);
  if (error) { console.error(error); return; }
  allRooms = data || [];
  renderRooms();
}

function setFilter(status, btn) {
  filterStatus = status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRooms();
}

function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRooms();
}

function renderRooms() {
  let rooms = [...allRooms];
  if (filterStatus !== 'all') rooms = rooms.filter(r => r.status === filterStatus);
  if (sortMode === 'live_first') {
    const order = { live: 0, waiting: 1, ended: 2 };
    rooms.sort((a, b) => (order[a.status] ?? 3) - (order[b.status] ?? 3));
  }
  const grid = document.getElementById('roomsGrid');
  const count = document.getElementById('roomsCount');
  count.textContent = `${rooms.length} room${rooms.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';
  if (!rooms.length) {
    grid.innerHTML = `<div class="rooms-empty"><div class="rooms-empty-icon">🎌</div><p>No rooms yet.<br>Be the first to create one!</p></div>`;
    return;
  }
  rooms.forEach(room => grid.appendChild(mkRoomCard(room)));
}

function mkRoomCard(room) {
  const statusClass = `status-${room.status}`;
  const statusLabel = room.status === 'live' ? 'Live' : room.status === 'waiting' ? 'Waiting' : 'Ended';
  const timeAgo = getTimeAgo(room.created_at);
  const avSrc = room.avatar_url || `https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(room.username||'anon')}&radius=50`;

  const card = document.createElement('div');
  card.className = 'room-card';
  card.innerHTML = `
    <img class="room-card-poster" src="${room.anime_image||''}" alt="" loading="lazy" onerror="this.style.background='var(--bg3)'">
    <div class="room-card-body">
      <div class="room-card-title">${room.anime_title_en||room.anime_title||'Unknown'}</div>
      <div class="room-card-badges">
        <span class="badge badge-ep">EP ${room.episode||1}</span>
        <span class="badge badge-${room.lang||'sub'}">${(room.lang||'sub').toUpperCase()}</span>
      </div>
      <div class="room-card-status ${statusClass}">
        <div class="status-dot"></div>
        <span class="status-label">${statusLabel}</span>
        <span style="font-size:10px;color:var(--muted2);margin-left:auto">${timeAgo}</span>
      </div>
      <div class="room-card-creator">
        <img class="creator-avatar" src="${avSrc}" alt="" onerror="this.src='https://api.dicebear.com/8.x/avataaars/svg?seed=anon&radius=50'">
        <span class="creator-name">${room.username||'Anonymous'}</span>
      </div>
    </div>
    <div class="room-join-overlay"><div class="room-join-btn">Join Room</div></div>`;
  card.onclick = () => joinRoom(room);
  return card;
}

function getTimeAgo(ts) {
  const sec = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}

/* ── JOIN ROOM ── */
function joinRoom(room) {
  const title = room.anime_title_en || room.anime_title || 'Unknown';
  document.getElementById('joinPoster').src = room.anime_image || '';
  document.getElementById('joinTitle').textContent = title;
  document.getElementById('joinMeta').textContent = `EP ${room.episode} · ${(room.lang||'sub').toUpperCase()} · by ${room.username||'Anonymous'}`;
  const roomUrl = `https://w2g.tv/rooms/${room.streamkey}`;
  document.getElementById('joinShareInput').value = roomUrl;
  document.getElementById('joinIframe').src = `https://w2g.tv/rooms/${room.streamkey}?embed=true`;
  document.getElementById('joinModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeJoin() {
  document.getElementById('joinModal').classList.remove('open');
  document.getElementById('joinIframe').src = '';
  document.body.style.overflow = '';
}
function copyJoinLink() {
  navigator.clipboard.writeText(document.getElementById('joinShareInput').value).then(() => {
    const btn = document.getElementById('joinCopyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ── CREATE ROOM ── */
function openCreate() {
  document.getElementById('createPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!currentUser) {
    document.getElementById('createLoginPrompt').style.display = 'block';
    document.getElementById('createForm').style.display = 'none';
  } else {
    document.getElementById('createLoginPrompt').style.display = 'none';
    document.getElementById('createForm').style.display = 'block';
  }
}
function closeCreate() {
  document.getElementById('createPanel').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('createPanel').addEventListener('click', e => { if (e.target === document.getElementById('createPanel')) closeCreate(); });

function setCLang(l) {
  createLang = l;
  document.getElementById('clBtnSub').classList.toggle('active', l === 'sub');
  document.getElementById('clBtnDub').classList.toggle('active', l === 'dub');
}
function setCStatus(s) {
  createStatus = s;
  document.getElementById('clBtnLive').className = 'status-btn' + (s === 'live' ? ' active-live' : '');
  document.getElementById('clBtnWaiting').className = 'status-btn' + (s === 'waiting' ? ' active-waiting' : '');
}

async function createSearchAnime(q) {
  const list = document.getElementById('createResults');
  list.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:6px">Searching…</div>';
  const data = await jikan('/anime', { q, limit: 6 });
  const items = data?.data || [];
  list.innerHTML = '';
  if (!items.length) { list.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:6px">No results.</div>'; return; }
  items.forEach(anime => {
    const title = anime.title_english || anime.title || '';
    const img = anime.images?.jpg?.image_url || '';
    const div = document.createElement('div');
    div.className = 'sri' + (createSelectedAnime?.mal_id === anime.mal_id ? ' selected' : '');
    div.innerHTML = `<img src="${img}" alt="" onerror="this.style.display='none'"><div><div class="sri-title">${title}</div><div class="sri-meta">${anime.type||'TV'} · ${anime.year||''}</div></div>`;
    div.onclick = () => selectCreateAnime(anime);
    list.appendChild(div);
  });
}

function selectCreateAnime(anime) {
  createSelectedAnime = anime;
  const title = anime.title_english || anime.title || '';
  document.querySelectorAll('.sri').forEach(el => el.classList.toggle('selected', el.querySelector('.sri-title')?.textContent === title));
  if (anime.episodes) document.getElementById('createEp').max = anime.episodes;
  const info = document.getElementById('createSelectedInfo');
  info.style.display = 'block';
  info.innerHTML = `<strong style="color:var(--text)">${title}</strong><br>${anime.episodes||'?'} episodes · ${anime.type||'TV'}`;
  document.getElementById('createSubmitBtn').disabled = false;
  document.getElementById('createSearch').value = title;
  document.getElementById('createResults').innerHTML = '';
}

async function submitRoom() {
  if (!createSelectedAnime || !currentUser) return;
  const btn = document.getElementById('createSubmitBtn');
  const msg = document.getElementById('createMsg');
  btn.disabled = true; btn.textContent = 'Creating…'; msg.textContent = '';

  const ep = parseInt(document.getElementById('createEp').value) || 1;
  const streamUrl = `${MEGAPLAY}/${createSelectedAnime.mal_id}/${ep}/${createLang}`;

  try {
    // Create W2G room via CORS proxy
    const r = await fetch(CORS + encodeURIComponent('https://api.w2g.tv/rooms/create.json'), {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ w2g_api_key: W2G_KEY, share: streamUrl, bg_color: '08080e', bg_opacity: '100' })
    });
    if (!r.ok) throw new Error('W2G HTTP ' + r.status);
    const w2gData = await r.json();
    if (!w2gData.streamkey) throw new Error('No streamkey');

    // Save to Supabase
    const client = await getSB();
    const { error } = await client.from('watch_rooms').insert({
      streamkey: w2gData.streamkey,
      anime_mal_id: createSelectedAnime.mal_id,
      anime_title: createSelectedAnime.title || '',
      anime_title_en: createSelectedAnime.title_english || createSelectedAnime.title || '',
      anime_image: createSelectedAnime.images?.jpg?.large_image_url || createSelectedAnime.images?.jpg?.image_url || '',
      anime_type: createSelectedAnime.type || 'TV',
      episode: ep,
      lang: createLang,
      status: createStatus,
      created_by: currentUser.id,
      username: getDisplayName(currentUser),
      avatar_url: currentUser.user_metadata?.avatar_url || ''
    });
    if (error) throw new Error(error.message);

    msg.textContent = '🎉 Room created!'; msg.className = 'create-msg ok';
    setTimeout(() => {
      closeCreate();
      // Open the room immediately
      joinRoom({
        streamkey: w2gData.streamkey,
        anime_title_en: createSelectedAnime.title_english || createSelectedAnime.title,
        anime_image: createSelectedAnime.images?.jpg?.large_image_url || '',
        episode: ep,
        lang: createLang,
        username: getDisplayName(currentUser)
      });
    }, 800);
  } catch (err) {
    msg.textContent = 'Failed: ' + err.message;
    msg.className = 'create-msg err';
    console.error(err);
  }
  btn.disabled = false; btn.textContent = 'Create Watch Party';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeJoin(); closeCreate(); } });

init();
</script>
