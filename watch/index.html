<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch — AniCast</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/yeonvvx/AniCastImages/main/Logo/anicast%20logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#e63946;--accent-dim:rgba(230,57,70,0.18);--accent-border:rgba(230,57,70,0.35);
  --bg:#08080e;--bg2:#101018;--bg3:#181825;--bg4:#20202e;
  --text:#f0f0f8;--muted:#7a7a96;--muted2:#545470;
  --radius:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* NAV */
nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 1.5rem;gap:12px;background:rgba(8,8,14,0.98);border-bottom:0.5px solid rgba(255,255,255,0.07);backdrop-filter:blur(16px)}
.nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,0.1)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--text)}
.nav-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-user{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
.nav-user img{width:24px;height:24px;border-radius:50%;object-fit:cover}
.w2g-nav-btn{display:flex;align-items:center;gap:6px;background:var(--accent-dim);border:0.5px solid var(--accent-border);color:var(--accent);border-radius:var(--radius);padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:all 0.2s;white-space:nowrap}
.w2g-nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* LAYOUT */
.page{max-width:1400px;margin:0 auto;padding:1.5rem}
.watch-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}

/* PLAYER */
.player-section{}
.player-frame{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;position:relative}
.player-frame iframe{width:100%;height:100%;border:none;display:block}
.player-frame .player-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;font-size:13px;color:var(--muted)}

/* EP STRIP */
.ep-section{margin-top:14px;background:var(--bg2);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px}
.ep-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ep-section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted)}
.lang-toggle{display:flex;border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden}
.lang-btn{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;transition:all 0.2s}
.lang-btn.active{background:var(--accent);color:#fff}
.ep-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:200px;overflow-y:auto}
.ep-pill{padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1);color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:inherit}
.ep-pill:hover{background:rgba(255,255,255,0.13);color:var(--text)}
.ep-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ANIME INFO */
.anime-info{margin-top:14px;background:var(--bg2);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px}
.anime-info-inner{display:flex;gap:16px}
.anime-poster{width:80px;height:120px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg3)}
.anime-info-text{flex:1;min-width:0}
.anime-title-main{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3vw,26px);letter-spacing:1px;line-height:1.1;margin-bottom:8px}
.anime-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.anime-score{color:#f4c430;font-weight:700;font-size:13px}
.anime-year{font-size:12px;color:var(--muted)}
.anime-badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:3px;background:var(--accent-dim);color:var(--accent);border:0.5px solid var(--accent-border)}
.anime-genre{font-size:11px;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1)}
.anime-synopsis{font-size:12px;line-height:1.7;color:rgba(240,240,248,0.72);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.anime-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-sm{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;border:none;text-decoration:none}
.btn-sm-primary{background:var(--accent);color:#fff}
.btn-sm-primary:hover{background:#c7303c}
.btn-sm-sec{background:rgba(255,255,255,0.08);color:var(--text);border:0.5px solid rgba(255,255,255,0.12)}
.btn-sm-sec:hover{background:rgba(255,255,255,0.14)}
.btn-sm-sec.saved{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* SIDEBAR */
.sidebar{}
.sidebar-card{background:var(--bg2);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px;margin-bottom:14px}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);margin-bottom:12px}

/* COMMENTS */
.cep-bar{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.cep-bar::-webkit-scrollbar{display:none}
.cep-pill{flex-shrink:0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--muted);font-family:inherit;transition:all 0.2s}
.cep-pill.active,.cep-pill:hover{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:16px;align-items:flex-start}
.comment-avatar-sm{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.comment-textarea{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--text);font-family:inherit;outline:none;resize:none;min-height:64px;transition:border-color 0.2s;line-height:1.5}
.comment-textarea:focus{border-color:var(--accent)}
.comment-submit-row{display:flex;justify-content:flex-end;margin-top:6px}
.comment-submit{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.comment-sign-in{font-size:12px;color:var(--muted);text-align:center;padding:10px 0}
.comment-sign-in a{color:var(--accent);text-decoration:none;cursor:pointer}
.comments-list{display:flex;flex-direction:column;gap:0}
.comment-item{padding:11px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
.comment-item:last-child{border-bottom:none}
.comment-main{display:flex;gap:8px}
.comment-body{flex:1;min-width:0}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.comment-name{font-size:11px;font-weight:700;color:var(--text)}
.comment-time{font-size:10px;color:var(--muted2)}
.comment-text{font-size:12px;line-height:1.6;color:rgba(240,240,248,0.85);word-break:break-word}
.comment-actions{display:flex;align-items:center;gap:10px;margin-top:6px}
.caction{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;transition:color 0.2s;padding:0}
.caction:hover{color:var(--text)}
.caction.liked{color:var(--accent)}
.reply-form{margin-top:8px;display:none;gap:7px;align-items:flex-start}
.reply-form.show{display:flex}
.reply-textarea{flex:1;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:7px 10px;font-size:11px;color:var(--text);font-family:inherit;outline:none;resize:none;min-height:48px}
.reply-textarea:focus{border-color:var(--accent)}
.reply-submit{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;align-self:flex-end;flex-shrink:0}
.replies{margin-left:36px;border-left:0.5px solid rgba(255,255,255,0.07);padding-left:12px;margin-top:8px}
.reply-item{padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.reply-item:last-child{border-bottom:none}
.comments-empty{font-size:12px;color:var(--muted);text-align:center;padding:20px 0}
.comments-loading{font-size:12px;color:var(--muted);text-align:center;padding:14px 0}
.load-more-btn{width:100%;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);color:var(--muted);border-radius:var(--radius);padding:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:10px;transition:all 0.2s}
.load-more-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}

/* RELATED */
.related-card{display:flex;gap:10px;cursor:pointer;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);transition:opacity 0.2s}
.related-card:hover{opacity:0.8}
.related-card:last-child{border-bottom:none}
.related-poster{width:48px;height:70px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.related-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:3px}
.related-meta{font-size:10px;color:var(--muted)}

.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

@media(max-width:900px){
  .watch-layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .page{padding:1rem}
}
@media(max-width:600px){
  nav{padding:0 1rem}
  .anime-info-inner{flex-direction:column}
  .anime-poster{width:100%;height:160px}
}

/* ── HAMBURGER ── */
.hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:36px;height:36px;background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;z-index:299;background:rgba(8,8,14,0.98);backdrop-filter:blur(20px);flex-direction:column;overflow-y:auto}
.mobile-menu.open{display:flex}
.mm-profile{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:0.5px solid rgba(255,255,255,0.07)}
.mm-profile img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--bg3)}
.mm-profile-name{font-size:15px;font-weight:600}
.mm-profile-sub{font-size:12px;color:var(--muted);margin-top:2px}
.mm-links{display:flex;flex-direction:column;padding:8px 0}
.mm-link{display:flex;align-items:center;gap:14px;padding:14px 24px;font-size:15px;font-weight:500;color:var(--text);text-decoration:none;background:none;border:none;font-family:inherit;cursor:pointer;width:100%;text-align:left;transition:background 0.2s;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.mm-link:hover{background:rgba(255,255,255,0.05)}
.mm-link:last-child{border-bottom:none}
.mm-link svg{color:var(--muted);flex-shrink:0}
@media(max-width:900px){
  .hamburger{display:flex}
  .nav-right{gap:8px}
  .w2g-nav-btn{display:none}
  .nav-user{display:none}
}
</style>
</head>

<script>
const JIKAN='https://api.jikan.moe/v4';
const MEGAPLAY='https://megaplay.buzz/stream/mal';
const SUPABASE_URL='https://cwsmcrqfxhloyzfczpoo.supabase.co';
const SUPABASE_KEY='sb_publishable_oqiDI9aRF4SoudJVTeywrQ_O9sjL4Y8';

let sb=null, currentUser=null;
let malId=null, currentEp=1, currentLang='sub';
let animeData=null;
let commentEp=0, commentOffset=0;
const PER_PAGE=20;
let likedComments=new Set();

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function getSB(){
  if(sb) return sb;
  const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  sb=createClient(SUPABASE_URL,SUPABASE_KEY);
  return sb;
}

async function jikan(path,params={}){
  const url=new URL(JIKAN+path);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  for(let a=0;a<3;a++){
    try{
      const r=await fetch(url.toString());
      if(r.status===429){await sleep(2000*(a+1));continue;}
      if(!r.ok) return {};
      return await r.json();
    }catch{return {};}
  }
  return {};
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(ts){
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<604800) return Math.floor(s/86400)+'d ago';
  return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'});
}
function getDisplayName(u){return u?.user_metadata?.username||u?.email?.split('@')[0]||'Anon';}
function getAvatarUrl(u){
  if(u?.user_metadata?.avatar_url) return u.user_metadata.avatar_url;
  const seed=u?.user_metadata?.username||u?.email?.split('@')[0]||'guest';
  return `https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(seed)}&radius=50&backgroundColor=b6e3f4,c0aede,d1d4f9`;
}

/* ── INIT ── */
async function init(){
  const params=new URLSearchParams(window.location.search);
  malId=params.get('mal');
  currentEp=parseInt(params.get('ep'))||1;
  currentLang=params.get('lang')||'sub';

  if(!malId){ window.location.href='https://anicast.watch'; return; }

  // Auth
  const client=await getSB();
  const{data:{session}}=await client.auth.getSession();
  if(session?.user){ currentUser=session.user; renderNavUser(); updateMobileUser(currentUser); }
  else { updateMobileUser(null); }

  // Load player immediately
  loadPlayer(malId, currentEp, currentLang);

  // Update lang buttons
  document.getElementById('btnSub').classList.toggle('active',currentLang==='sub');
  document.getElementById('btnDub').classList.toggle('active',currentLang==='dub');

  // Load anime data
  const data=await jikan('/anime/'+malId);
  if(data?.data){
    animeData=data.data;
    renderAnimeInfo(animeData);
    buildEpGrid(animeData.episodes||1);
    buildCommentEpBar(animeData.episodes||0);
    loadRelated(animeData.genres?.[0]?.mal_id, malId);
    document.title=`${animeData.title_english||animeData.title||'Watch'} — AniCast`;
    document.getElementById('navTitle').textContent=(animeData.title_english||animeData.title||'')+(` — EP ${currentEp}`);
    document.getElementById('w2gBtn').href=`https://anicast.watch/w2g?mal=${malId}&title=${encodeURIComponent(animeData.title_english||animeData.title||'')}`;
  }

  // Load comments
  initComments();
}

function loadPlayer(mal, ep, lang){
  const frame=document.getElementById('playerFrame');
  const loading=document.getElementById('playerLoading');
  frame.style.opacity='0';
  loading.style.display='flex';
  frame.src=`${MEGAPLAY}/${mal}/${ep}/${lang}`;
  frame.onload=()=>{ frame.style.opacity='1'; loading.style.display='none'; };
  currentEp=ep; currentLang=lang;
  // Update URL
  const url=new URL(window.location);
  url.searchParams.set('ep',ep);
  url.searchParams.set('lang',lang);
  window.history.replaceState({},'',url);
  // Update ep label
  document.getElementById('epCurrentLabel').textContent=`Episode ${ep}`;
  if(animeData) document.getElementById('navTitle').textContent=(animeData.title_english||animeData.title||'')+` — EP ${ep}`;
  // Highlight active ep
  document.querySelectorAll('.ep-pill').forEach(b=>b.classList.toggle('active',+b.dataset.ep===ep));
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('btnSub').classList.toggle('active',lang==='sub');
  document.getElementById('btnDub').classList.toggle('active',lang==='dub');
  loadPlayer(malId,currentEp,lang);
}

function buildEpGrid(total){
  const grid=document.getElementById('epGrid');
  grid.innerHTML='';
  const count=Math.min(total,500);
  for(let i=1;i<=count;i++){
    const btn=document.createElement('button');
    btn.className='ep-pill'+(i===currentEp?' active':'');
    btn.textContent=i;
    btn.dataset.ep=i;
    btn.onclick=()=>loadPlayer(malId,i,currentLang);
    grid.appendChild(btn);
  }
  // Scroll active into view
  setTimeout(()=>{
    const a=grid.querySelector('.ep-pill.active');
    if(a) a.scrollIntoView({block:'nearest',inline:'center'});
  },100);
}

function renderAnimeInfo(anime){
  const title=anime.title_english||anime.title||'';
  const poster=anime.images?.jpg?.large_image_url||anime.images?.jpg?.image_url||'';
  const synopsis=(anime.synopsis||'').replace(/\[Written.*?\]/g,'');
  const genres=(anime.genres||[]).slice(0,4).map(g=>`<span class="anime-genre">${g.name}</span>`).join('');
  const inWl=false; // TODO: connect to watchlist
  document.getElementById('animeInfo').innerHTML=`
    <div class="anime-info-inner">
      <img class="anime-poster" src="${poster}" alt="">
      <div class="anime-info-text">
        <div class="anime-title-main">${esc(title)}</div>
        <div class="anime-meta-row">
          ${anime.score?`<span class="anime-score">★ ${anime.score}</span>`:''}
          ${anime.year?`<span class="anime-year">${anime.year}</span>`:''}
          ${anime.type?`<span class="anime-badge">${anime.type}</span>`:''}
          ${genres}
        </div>
        <div class="anime-synopsis">${esc(synopsis)}</div>
        <div class="anime-actions">
          <a href="https://anicast.watch/w2g?mal=${malId}&title=${encodeURIComponent(title)}" class="btn-sm btn-sm-primary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Watch Party
          </a>
          <button class="btn-sm btn-sm-sec" onclick="window.location.href='https://anicast.watch'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Browse
          </button>
        </div>
      </div>
    </div>`;
}

async function loadRelated(genreId, excludeMal){
  if(!genreId) return;
  const data=await jikan('/anime',{genres:genreId,order_by:'score',sort:'desc',limit:8});
  const items=(data?.data||[]).filter(a=>a.mal_id!=excludeMal).slice(0,6);
  const list=document.getElementById('relatedList');
  list.innerHTML='';
  items.forEach(anime=>{
    const title=anime.title_english||anime.title||'';
    const img=anime.images?.jpg?.image_url||'';
    const div=document.createElement('div');
    div.className='related-card';
    div.innerHTML=`<img class="related-poster" src="${img}" alt="" loading="lazy" onerror="this.style.background='var(--bg3)'"><div><div class="related-title">${esc(title)}</div><div class="related-meta">${anime.type||'TV'} · ${anime.year||''} · ★${anime.score||'—'}</div></div>`;
    div.onclick=()=>{ window.location.href=`/watch?mal=${anime.mal_id}&ep=1&lang=sub`; };
    list.appendChild(div);
  });
}

function renderNavUser(){
  const el=document.getElementById('navUser');
  if(!currentUser){el.innerHTML='';return;}
  const name=getDisplayName(currentUser);
  const av=getAvatarUrl(currentUser);
  el.innerHTML=`<img src="${av}" onerror="this.style.display='none'"><span style="font-size:12px;font-weight:600">${esc(name)}</span>`;
}

/* ── COMMENTS ── */
function buildCommentEpBar(total){
  const bar=document.getElementById('commentEpBar');
  bar.innerHTML='';
  const gen=document.createElement('button');
  gen.className='cep-pill active'; gen.textContent='General';
  gen.onclick=()=>switchCommentEp(0,gen); bar.appendChild(gen);
  const max=Math.min(total,100);
  for(let i=1;i<=max;i++){
    const btn=document.createElement('button');
    btn.className='cep-pill'; btn.textContent='EP '+i;
    btn.onclick=(()=>{const ep=i;return()=>switchCommentEp(ep,btn);})();
    bar.appendChild(btn);
  }
}

async function switchCommentEp(ep,btn){
  commentEp=ep; commentOffset=0;
  document.querySelectorAll('.cep-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ta=document.getElementById('commentTextareaEl');
  if(ta) ta.placeholder=ep>0?`Share your thoughts about Episode ${ep}…`:'Share your thoughts about this anime…';
  await loadComments(true);
}

async function initComments(){
  // Show input or sign-in
  const area=document.getElementById('commentInputArea');
  if(currentUser){
    const av=getAvatarUrl(currentUser);
    area.innerHTML=`
      <div class="comment-input-wrap">
        <img class="comment-avatar-sm" src="${av}" alt="">
        <div style="flex:1">
          <textarea class="comment-textarea" id="commentTextareaEl" placeholder="Share your thoughts about this anime…" rows="3"></textarea>
          <div class="comment-submit-row"><button class="comment-submit" onclick="submitComment()">Post Comment</button></div>
        </div>
      </div>`;
    // Load liked
    const client=await getSB();
    const{data}=await client.from('comment_likes').select('comment_id').eq('user_id',currentUser.id);
    likedComments=new Set((data||[]).map(r=>r.comment_id));
  } else {
    document.getElementById('commentSignIn').style.display='block';
  }
  await loadComments(true);
}

async function loadComments(reset=false){
  if(reset) commentOffset=0;
  const list=document.getElementById('commentsList');
  if(reset) list.innerHTML='<div class="comments-loading">Loading…</div>';
  const client=await getSB();
  const{data,error}=await client.from('comments')
    .select('*').eq('mal_id',malId).eq('episode',commentEp)
    .is('parent_id',null).order('created_at',{ascending:false})
    .range(commentOffset,commentOffset+PER_PAGE-1);
  if(reset) list.innerHTML='';
  if(error||!data||!data.length){
    if(reset) list.innerHTML='<div class="comments-empty">No comments yet. Be the first!</div>';
    document.getElementById('loadMoreBtn').style.display='none';
    return;
  }
  const ids=data.map(c=>c.id);
  const{data:replies}=await client.from('comments').select('*').in('parent_id',ids).order('created_at',{ascending:true});
  const replyMap={};
  (replies||[]).forEach(r=>{if(!replyMap[r.parent_id])replyMap[r.parent_id]=[];replyMap[r.parent_id].push(r);});
  data.forEach(c=>list.appendChild(buildCommentEl(c,replyMap[c.id]||[],false)));
  commentOffset+=data.length;
  document.getElementById('loadMoreBtn').style.display=data.length<PER_PAGE?'none':'block';
}

async function loadMoreComments(){ await loadComments(false); }

function buildCommentEl(c,replies,isReply){
  const div=document.createElement('div');
  div.className=isReply?'reply-item':'comment-item';
  div.id='comment-'+c.id;
  const av=c.avatar_url||`https://api.dicebear.com/8.x/avataaars/svg?seed=${encodeURIComponent(c.username||'anon')}&radius=50`;
  const isLiked=likedComments.has(c.id);
  const isMine=currentUser&&currentUser.id===c.user_id;
  const repliesHtml=replies.length
    ?`<div class="replies" id="replies-${c.id}">${replies.map(r=>buildCommentEl(r,[],true).outerHTML).join('')}</div>`
    :`<div class="replies" id="replies-${c.id}" style="display:none"></div>`;
  div.innerHTML=`
    <div class="comment-main">
      <img class="comment-avatar-sm" src="${av}" alt="" onerror="this.style.background='var(--bg3)'">
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-name">${esc(c.username||'Anon')}</span>
          <span class="comment-time">${timeAgo(c.created_at)}</span>
        </div>
        <div class="comment-text">${esc(c.content)}</div>
        <div class="comment-actions">
          <button class="caction${isLiked?' liked':''}" onclick="toggleLike('${c.id}',this)">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span id="likes-${c.id}">${c.likes||0}</span>
          </button>
          ${!isReply&&currentUser?`<button class="caction" onclick="toggleReplyForm('${c.id}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Reply${replies.length?` (${replies.length})`:''}
          </button>`:''}
          ${isMine?`<button class="caction" onclick="deleteComment('${c.id}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            Delete
          </button>`:''}
        </div>
        ${!isReply&&currentUser?`<div class="reply-form" id="reply-form-${c.id}">
          <img class="comment-avatar-sm" src="${currentUser?getAvatarUrl(currentUser):''}" style="width:22px;height:22px" alt="">
          <textarea class="reply-textarea" id="reply-input-${c.id}" placeholder="Write a reply…" rows="2"></textarea>
          <button class="reply-submit" onclick="submitReply('${c.id}')">Reply</button>
        </div>`:''}
      </div>
    </div>
    ${!isReply?repliesHtml:''}`;
  return div;
}

async function submitComment(){
  if(!currentUser) return;
  const ta=document.getElementById('commentTextareaEl');
  const text=ta?.value.trim();
  if(!text) return;
  ta.value='';
  const client=await getSB();
  await client.from('comments').insert({
    mal_id:malId, episode:commentEp,
    user_id:currentUser.id,
    username:getDisplayName(currentUser),
    avatar_url:getAvatarUrl(currentUser),
    content:text, parent_id:null, likes:0
  });
  await loadComments(true);
}

function toggleReplyForm(id){
  const form=document.getElementById('reply-form-'+id);
  if(!form) return;
  form.classList.toggle('show');
  if(form.classList.contains('show')) document.getElementById('reply-input-'+id)?.focus();
}

async function submitReply(parentId){
  if(!currentUser) return;
  const ta=document.getElementById('reply-input-'+parentId);
  const text=ta?.value.trim();
  if(!text) return;
  const client=await getSB();
  const{data,error}=await client.from('comments').insert({
    mal_id:malId, episode:commentEp,
    user_id:currentUser.id,
    username:getDisplayName(currentUser),
    avatar_url:getAvatarUrl(currentUser),
    content:text, parent_id:parentId, likes:0
  }).select().single();
  if(!error&&data){
    ta.value='';
    document.getElementById('reply-form-'+parentId)?.classList.remove('show');
    const repliesEl=document.getElementById('replies-'+parentId);
    if(repliesEl){ repliesEl.style.display=''; repliesEl.appendChild(buildCommentEl(data,[],true)); }
  }
}

async function toggleLike(commentId,btn){
  if(!currentUser){ window.location.href='https://anicast.watch'; return; }
  const client=await getSB();
  const isLiked=likedComments.has(commentId);
  const countEl=document.getElementById('likes-'+commentId);
  const cur=parseInt(countEl?.textContent)||0;
  if(isLiked){
    await client.from('comment_likes').delete().eq('user_id',currentUser.id).eq('comment_id',commentId);
    await client.from('comments').update({likes:Math.max(0,cur-1)}).eq('id',commentId);
    likedComments.delete(commentId);
    btn.classList.remove('liked');
    btn.querySelector('svg').setAttribute('fill','none');
    if(countEl) countEl.textContent=Math.max(0,cur-1);
  } else {
    await client.from('comment_likes').insert({user_id:currentUser.id,comment_id:commentId});
    await client.from('comments').update({likes:cur+1}).eq('id',commentId);
    likedComments.add(commentId);
    btn.classList.add('liked');
    btn.querySelector('svg').setAttribute('fill','currentColor');
    if(countEl) countEl.textContent=cur+1;
  }
}

async function deleteComment(commentId){
  if(!currentUser||!confirm('Delete this comment?')) return;
  const client=await getSB();
  await client.from('comments').delete().eq('id',commentId).eq('user_id',currentUser.id);
  document.getElementById('comment-'+commentId)?.remove();
}


function toggleMobileMenu(){
  const m=document.getElementById('mobileMenu');
  const b=document.getElementById('hamburger');
  const open=m.classList.toggle('open');
  b.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeMobileMenu(){
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.body.style.overflow='';
}
function updateMobileUser(user){
  if(!user){
    document.getElementById('mmAvatar').src='https://api.dicebear.com/8.x/avataaars/svg?seed=guest&radius=50';
    document.getElementById('mmName').textContent='Guest';
    document.getElementById('mmSub').textContent='Not signed in';
    document.getElementById('mmAuthLink').innerHTML=`<a class="mm-link" href="https://anicast.watch" style="color:var(--accent)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </a>`;
  } else {
    document.getElementById('mmAvatar').src=getAvatarUrl(user);
    document.getElementById('mmName').textContent=getDisplayName(user);
    document.getElementById('mmSub').textContent=user.email||'';
    document.getElementById('mmAuthLink').innerHTML='';
  }
}

init();
</script>
